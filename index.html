<head>

    <style>
                /* === НАСТРОЙКИ РАЗМЕРА ПЛЕЕРА === */
        :root {
            --player-width: 600px;      /* Максимальная ширина плеера */
            --canvas-height: 180px;     /* Высота эквалайзера */
            --button-width: 180px;      /* Ширина кнопки */
            --button-padding: 10px;     /* Вертикальный отступ кнопки */
            --button-font-size: 1.3rem; /* Размер текста кнопки */
        }
    
        .mobile-container {
            max-width: var(--player-width);
        }

        canvas {
            height: var(--canvas-height);
        }
    
        .play-stop-btn {
            width: var(--button-width);
            padding: var(--button-padding) 0;
            font-size: var(--button-font-size);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8f9fc 0%, #f0f2f5 100%);
            min-height: 100vh;
        }

        .mobile-container {
            position: fixed;
            bottom: 100px;
            left: 100px;
            width: 400px;
            max-width: 90%;
            margin: 0;
            z-index: 10000;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 10px;
        }

        .custom-player {
            background: #03fff7;
            border-radius: 0;
            padding: 0;
            margin-top: 15px;
            margin-bottom: 20px;
            box-shadow: 0 12px 28px rgba(3, 255, 247, 0.2);
            overflow: hidden;
        }

        .button-container {
            display: flex;
            justify-content: center;
            padding: 4px 0 4px 0;
            background: #03fff7;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
        }

        .play-stop-btn {
            background: linear-gradient(135deg, #8b0000, #5a0000);
            border: none;
            width: 180px;
            padding: 10px 0;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 6px 16px rgba(139, 0, 0, 0.4);
            gap: 10px;
            letter-spacing: 1px;
        }

        .play-stop-btn:active {
            transform: scale(0.97);
        }

        .visualizer-container {
            background: rgba(0, 0, 0, 0.15);
            padding: 20px 16px 24px 16px;
        }

        canvas {
            width: 100%;
            height: 180px;
            display: block;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .status-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .version-switcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 10000;
            background: rgba(0,0,0,0.6);
            padding: 15px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .version-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #btnMobile {
            background: #e81e4d;
        }

        #btnFull {
            background: #4CAF50;
        }

        .version-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .version-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            .version-switcher {
                bottom: 20px;
                right: 20px;
                padding: 10px 15px;
                gap: 10px;
                flex-direction: column;
                border-radius: 30px;
            }
            .version-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
            .mobile-container {
                padding: 8px 16px 16px 16px;
            }
            .play-stop-btn {
                width: 160px;
                padding: 9px 0;
                font-size: 1.2rem;
            }
            canvas {
                height: 150px;
            }
        }
    </style>
</head>
<body>

    <!-- ВАШИ ИЗОБРАЖЕНИЯ -->
    <img src="img/20260225_2221_image.png" alt="RADIO DJ BOGA" style="position: absolute; left: 1675px; top: 0;">
    <img src="img/result_Без имени-1 копия.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 0px; width: 1000px; height: auto;">
    <img src="img/i1.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 1000px; width: 1000px; height: 248px;">

    <!-- МОБИЛЬНЫЙ ПЛЕЕР -->
    <div class="mobile-container">
        <div class="custom-player">
            <div class="button-container">
                <button class="play-stop-btn" id="playStopBtn">▶ PLAY</button>
            </div>
            <div class="visualizer-container">
                <canvas id="visualizerCanvas" width="800" height="180"></canvas>
            </div>
        </div>
        <div class="status-text" id="statusText">Готов к воспроизведению</div>
    </div>

    <!-- КНОПКИ ПЕРЕКЛЮЧЕНИЯ -->
    <div class="version-switcher">
        <button id="btnMobile" class="version-btn" onclick="switchToMobile()">📱 Мобильная</button>
        <button id="btnFull" class="version-btn" onclick="switchToFull()">💻 Полная</button>
    </div>

    <script>
        // ============================================================
        // НАСТРОЙКИ РАДИО
        // ============================================================
        const RADIO_STREAM_URL = "https://radio.radiodjboga.online/stream";
        
        // ⚠️ РЕАЛЬНЫЕ АДРЕСА ВАШИХ СТРАНИЦ (ЗАМЕНИТЕ НА ПРАВИЛЬНЫЕ)
        const MOBILE_URL = "https://mobile.radiodjboga.online";  // Ваша мобильная страница
        const FULL_URL = "https://radiodjboga.online";          // Ваша полная версия (или другой адрес)
        // ============================================================

        const playStopBtn = document.getElementById('playStopBtn');
        const statusSpan = document.getElementById('statusText');
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        
        let audioElement = null;
        let audioContext = null;
        let sourceNode = null;
        let analyserNode = null;
        let gainNode = null;
        let animationId = null;
        let isPlaying = false;
        
        let dataArray = null;
        let canvasWidth = 800;
        let canvasHeight = 180;
        let prevValues = [];
        
        function updateStatus(msg, isError = false) {
            statusSpan.textContent = msg;
            statusSpan.style.color = isError ? '#e74c3c' : '#1a1a2e';
            console.log(msg);
        }
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth - 32;
            canvas.width = width;
            canvas.height = 180;
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;
            if (analyserNode) {
                const bufferLength = analyserNode.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                prevValues = new Array(bufferLength).fill(0);
            }
        }
        
        window.addEventListener('resize', () => setTimeout(resizeCanvas, 100));
        resizeCanvas();
        
        async function initWebAudioForRadio() {
            if (!audioElement) return false;
            
            if (audioContext && audioContext.state !== 'closed') {
                if (animationId) cancelAnimationFrame(animationId);
                try { await audioContext.close(); } catch(e) {}
            }
            
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                sourceNode = audioContext.createMediaElementSource(audioElement);
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                analyserNode.smoothingTimeConstant = 0.7;
                gainNode = audioContext.createGain();
                gainNode.gain.value = 0.8;
                
                sourceNode.connect(analyserNode);
                analyserNode.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                const bufferLength = analyserNode.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                prevValues = new Array(bufferLength).fill(0);
                startVisualization();
                return true;
            } catch (error) {
                console.error("Web Audio ошибка:", error);
                return false;
            }
        }
        
        function getColorForHeight(percent, isPeak = false) {
            let hue;
            
            if (percent < 0.16) {
                hue = 120 - (percent / 0.16) * 60;
            } else if (percent < 0.33) {
                hue = 60 - ((percent - 0.16) / 0.17) * 30;
            } else if (percent < 0.5) {
                hue = 30 - ((percent - 0.33) / 0.17) * 15;
            } else if (percent < 0.66) {
                hue = 15 - ((percent - 0.5) / 0.16) * 15;
            } else if (percent < 0.83) {
                hue = 0 - ((percent - 0.66) / 0.17) * 60;
                if (hue < 0) hue += 360;
            } else {
                hue = 300 - ((percent - 0.83) / 0.17) * 60;
            }
            
            if (percent > 0.95) {
                hue = 240;
            }
            
            let sat = 85;
            let light = 50;
            
            if (isPeak && percent > 0.8) {
                light = 65;
                sat = 95;
            }
            
            return `hsl(${hue}, ${sat}%, ${light}%)`;
        }
        
        function startVisualization() {
            if (animationId) cancelAnimationFrame(animationId);
            
            function draw() {
                if (!analyserNode || !ctx) {
                    animationId = requestAnimationFrame(draw);
                    return;
                }
                if (dataArray) analyserNode.getByteFrequencyData(dataArray);
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                
                const barCount = analyserNode.frequencyBinCount;
                const halfBarCount = barCount / 2;
                
                let maxValue = 0;
                for (let i = 0; i < barCount; i++) {
                    if (dataArray[i] > maxValue) maxValue = dataArray[i];
                }
                if (maxValue < 1) maxValue = 255;
                
                const displayBars = [];
                for (let i = 0; i < barCount; i++) {
                    let distanceFromCenter = Math.abs(i - halfBarCount) / halfBarCount;
                    let frequencyWeight = 1 - distanceFromCenter;
                    let boostedValue = dataArray[i] * (0.5 + frequencyWeight * 0.8);
                    displayBars[i] = Math.min(255, boostedValue);
                }
                
                for (let i = 0; i < barCount; i++) {
                    let value = displayBars[i] || 0;
                    let percent = value / maxValue;
                    let barHeight = Math.max(4, percent * canvasHeight * 0.85);
                    
                    if (prevValues[i]) {
                        barHeight = prevValues[i] * 0.6 + barHeight * 0.4;
                    }
                    prevValues[i] = barHeight;
                    
                    const x = i * (canvasWidth / barCount);
                    const w = Math.max(6, (canvasWidth / barCount) * 1.6);
                    
                    const isPeak = value > 180;
                    
                    const gradient = ctx.createLinearGradient(x, canvasHeight - barHeight, x, canvasHeight);
                    gradient.addColorStop(0, getColorForHeight(0, false));
                    gradient.addColorStop(0.16, getColorForHeight(0.16, false));
                    gradient.addColorStop(0.33, getColorForHeight(0.33, false));
                    gradient.addColorStop(0.5, getColorForHeight(0.5, false));
                    gradient.addColorStop(0.66, getColorForHeight(0.66, false));
                    gradient.addColorStop(0.83, getColorForHeight(0.83, false));
                    gradient.addColorStop(1, getColorForHeight(1, isPeak));
                    
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = isPeak ? 10 : 4;
                    ctx.shadowColor = isPeak ? '#ff3300' : '#ff8c00';
                    ctx.fillRect(x + 1, canvasHeight - barHeight, w - 1, barHeight);
                    
                    if (isPeak && barHeight > 15) {
                        ctx.fillStyle = `rgba(100, 100, 255, 0.6)`;
                        ctx.fillRect(x + 1, canvasHeight - barHeight - 2, w - 1, 4);
                    }
                }
                ctx.shadowBlur = 0;
                animationId = requestAnimationFrame(draw);
            }
            draw();
        }
        
        async function startPlayback() {
            try {
                updateStatus('Подключение к потоку...');
                
                if (audioElement) {
                    audioElement.pause();
                    audioElement.src = '';
                    audioElement = null;
                }
                if (audioContext && audioContext.state !== 'closed') {
                    if (animationId) cancelAnimationFrame(animationId);
                    try { await audioContext.close(); } catch(e) {}
                    audioContext = null;
                    analyserNode = null;
                }
                
                const newAudio = new Audio();
                newAudio.crossOrigin = 'anonymous';
                newAudio.src = RADIO_STREAM_URL;
                newAudio.preload = 'auto';
                
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Таймаут загрузки')), 15000);
                    newAudio.addEventListener('canplay', () => {
                        clearTimeout(timeout);
                        resolve();
                    }, { once: true });
                    newAudio.addEventListener('error', () => {
                        clearTimeout(timeout);
                        reject(new Error('Ошибка загрузки потока'));
                    }, { once: true });
                    newAudio.load();
                });
                
                audioElement = newAudio;
                const webAudioOk = await initWebAudioForRadio();
                if (!webAudioOk) throw new Error('Не удалось инициализировать аудио');
                
                if (audioContext && audioContext.state === 'suspended') await audioContext.resume();
                await audioElement.play();
                isPlaying = true;
                playStopBtn.innerHTML = '⏹ STOP';
                updateStatus('▶ В эфире');
            } catch (err) {
                console.error(err);
                updateStatus('Ошибка: ' + err.message, true);
                isPlaying = false;
                playStopBtn.innerHTML = '▶ PLAY';
                if (audioElement) {
                    audioElement.pause();
                    audioElement.src = '';
                    audioElement = null;
                }
            }
        }
        
        function stopPlayback() {
            if (audioElement) audioElement.pause();
            isPlaying = false;
            playStopBtn.innerHTML = '▶ PLAY';
            updateStatus('Остановлено');
        }
        
        async function togglePlayStop() {
            if (isPlaying) {
                stopPlayback();
            } else {
                await startPlayback();
            }
        }
        
        let demoAnimationId = null;
        function demoVisualization() {
            if (demoAnimationId) cancelAnimationFrame(demoAnimationId);
            
            function drawDemo() {
                if (analyserNode && audioElement && audioElement.src && isPlaying) {
                    if (demoAnimationId) cancelAnimationFrame(demoAnimationId);
                    return;
                }
                
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                const barCount = 48;
                const halfBarCount = barCount / 2;
                const time = Date.now() * 0.005;
                
                for (let i = 0; i < barCount; i++) {
                    let distanceFromCenter = Math.abs(i - halfBarCount) / halfBarCount;
                    let boostFactor = Math.cos(distanceFromCenter * Math.PI / 2);
                    let fake = 20 + Math.sin(time + i * 0.2) * 15;
                    fake = fake * (0.3 + boostFactor * 0.9);
                    fake = Math.min(canvasHeight * 0.6, Math.max(5, fake));
                    
                    const x = i * (canvasWidth / barCount);
                    const w = Math.max(6, (canvasWidth / barCount) * 1.6);
                    
                    const gradient = ctx.createLinearGradient(x, canvasHeight - fake, x, canvasHeight);
                    gradient.addColorStop(0, '#00ff00');
                    gradient.addColorStop(0.25, '#ffff00');
                    gradient.addColorStop(0.5, '#ff8800');
                    gradient.addColorStop(0.75, '#ff0000');
                    gradient.addColorStop(1, '#0000aa');
                    
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#8888ff';
                    ctx.fillRect(x + 1, canvasHeight - fake, w - 1, fake);
                }
                ctx.shadowBlur = 0;
                demoAnimationId = requestAnimationFrame(drawDemo);
            }
            drawDemo();
        }
        
        playStopBtn.addEventListener('click', togglePlayStop);
        demoVisualization();
        updateStatus('Нажмите PLAY');
        
        window.addEventListener('beforeunload', () => {
            if (audioElement) audioElement.pause();
            if (audioContext) audioContext.close();
            if (animationId) cancelAnimationFrame(animationId);
            if (demoAnimationId) cancelAnimationFrame(demoAnimationId);
        });
        
        // ============================================================
        // ПЕРЕКЛЮЧЕНИЕ ВЕРСИЙ - ИСПРАВЛЕНО
        // ============================================================
        function switchToMobile() {
            localStorage.setItem('version', 'mobile');
            window.location.href = MOBILE_URL;
        }

        function switchToFull() {
            localStorage.setItem('version', 'full');
            window.location.href = FULL_URL;
        }

        function checkWindowSizeAndRedirect() {
            const currentVersion = localStorage.getItem('version');
            if (window.innerWidth <= 768) {
                if (currentVersion !== 'mobile') {
                    console.log('Авторедирект на мобильную версию');
                    localStorage.setItem('version', 'mobile');
                    window.location.href = MOBILE_URL;
                }
            } else {
                if (currentVersion !== 'full') {
                    console.log('Авторедирект на полную версию');
                    localStorage.setItem('version', 'full');
                    window.location.href = FULL_URL;
                }
            }
        }

        // ВАЖНО: Закомментируйте автоматический редирект при тестировании!
        // checkWindowSizeAndRedirect();
        
        // Раскомментируйте только когда укажете правильные адреса
        /*
        window.addEventListener('resize', function() {
            clearTimeout(window.resizedFinished);
            window.resizedFinished = setTimeout(() => {
                checkWindowSizeAndRedirect();
            }, 250);
        });

        window.addEventListener('orientationchange', function() {
            setTimeout(checkWindowSizeAndRedirect, 200);
        });
        */
    </script>
</body>
