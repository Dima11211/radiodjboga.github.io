    <title>Плеер и прямоугольник</title>
    <style>
        body, html {
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .player-container {
            width: 100%;
        }
        
        .rectangle-container {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;  /* Добавил relative */
        }
        
        .white-rectangle {
            width: 100px;
            height: 50px;
            background-color: white;
            border: 2px solid black;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;   /* Добавил relative */
            top: -50px;           /* Отрицательное значение тянет вверх */
        }
    </style>
</head>
<body>
    <!-- Плеер сверху -->
    <div class="player-container">
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publictoken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" data-theme="light" data-color="e81e4d" data-channelid="a136d51d-4d90-4173-a9a8-41513fe91d71" data-rendered="true" style="width: 100%; height: 192px;"><iframe src="./Stream Player_files/saved_resource.html" style="width: 100%; border: 0px; height: 192px;"></iframe></div>
        <script src="./Stream Player_files/embed.js"></script>
    </div>
    
    <!-- Белый прямоугольник -->
    <div class="rectangle-container">
        <div class="white-rectangle"></div>
    </div>

</html>
