<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIO DJ BOGA</title>

    <style>
        /* Стили для десктопной версии */
        .desktop-only {
            display: block;
        }
        
        .mobile-only {
            display: none;
        }
        
        /* Остальные стили как в вашем оригинальном коде */
        .player-container {
            position: absolute;
            top: 1000px;
            left: -12px;
            width: 700px;
            height: 500px;
            z-index: 1000;
        }
        
        /* МОБИЛЬНЫЕ СТИЛИ */
        @media (max-width: 768px) {
            .desktop-only {
                display: none;
            }
            
            .mobile-only {
                display: block;
            }
            
            /* Адаптация контента для мобильных */
            .mobile-wrapper {
                width: 100%;
                padding: 10px;
            }
            
            .mobile-wrapper img {
                max-width: 100%;
                height: auto;
                position: static !important;
                left: auto !important;
                top: auto !important;
                margin: 10px auto;
                display: block;
            }
            
            .player-container {
                position: relative;
                top: 0;
                left: 0;
                width: 100%;
                height: auto;
                margin: 15px 0;
            }
        }
        
        /* Стили для кнопок переключения (как у вас) */
        .version-switcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 10000;
            background: rgba(0,0,0,0.6);
            padding: 15px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .version-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        #btnMobile { background: #e81e4d; }
        #btnFull { background: #4CAF50; }
        
        .version-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
        
        @media (max-width: 600px) {
            .version-switcher {
                bottom: 20px;
                right: 20px;
                padding: 10px 15px;
                gap: 10px;
                flex-direction: column;
                border-radius: 30px;
            }
            .version-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ДЕСКТОПНАЯ ВЕРСИЯ (как у вас) -->
    <div class="desktop-only">
        <img src="img/20260225_2221_image.png" alt="RADIO DJ BOGA" style="position: absolute; left: 1675px; top: 0;">
        <img src="img/result_Без имени-1 копия.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 0px; width: 1000px; height: auto;">
        <img src="img/i1.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 1000px; width: 1000px; height: 248px;">

        <div class="player-container">
            <div data-type="newStreamPlayer" data-publicToken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false" class="cstrEmbed">
                <a href="https://www.caster.fm">Shoutcast Hosting</a>
                <a href="https://www.caster.fm">Stream Hosting</a>
                <a href="https://www.caster.fm">Radio Server Hosting</a>
            </div>
            <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
        </div>
    </div>

    <!-- МОБИЛЬНАЯ ВЕРСИЯ -->
    <div class="mobile-only">
        <div class="mobile-wrapper">
            <img src="img/20260225_2221_image.png" alt="RADIO DJ BOGA" style="width: 100%; max-width: 400px; margin: 0 auto;">
            <img src="img/result_Без имени-1 копия.jpg" alt="RADIO DJ BOGA" style="width: 90%; margin: 10px auto; border-radius: 10px;">
            
            <div class="player-container" style="position: relative; top: 0; left: 0; width: 100%; padding: 10px;">
                <div data-type="newStreamPlayer" data-publicToken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" data-theme="dark" data-color="e81e4d" data-channelId="" data-rendered="false" class="cstrEmbed">
                    <a href="https://www.caster.fm">Shoutcast Hosting</a>
                    <a href="https://www.caster.fm">Stream Hosting</a>
                    <a href="https://www.caster.fm">Radio Server Hosting</a>
                </div>
                <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
            </div>
            
            <img src="img/i1.jpg" alt="RADIO DJ BOGA" style="width: 100%; margin-top: 15px; border-radius: 10px;">
        </div>
    </div>

    <!-- Кнопки переключения версий -->
    <div class="version-switcher">
        <button id="btnMobile" class="version-btn" onclick="switchToMobile()">📱 Мобильная</button>
        <button id="btnFull" class="version-btn" onclick="switchToFull()">💻 Полная</button>
    </div>

    <script>
        // ========================================
        // НАСТРОЙКА ДОМЕНОВ
        // ========================================
        const MAIN_DOMAIN = "https://radiodjboga.online";
        const MOBILE_DOMAIN = "https://mobile.radiodjboga.online";
        
        // ========================================
        // Функции для переключения
        // ========================================
        function switchToMobile() {
            localStorage.setItem('version', 'mobile');
            window.location.href = MOBILE_DOMAIN;
        }

        function switchToFull() {
            localStorage.setItem('version', 'full');
            window.location.href = MAIN_DOMAIN;
        }

        // ========================================
        // Определение мобильного устройства
        // ========================================
        function isMobileDevice() {
            return window.innerWidth <= 768 || 
                   /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // ========================================
        // Автоматический редирект
        // ========================================
        function checkAndRedirect() {
            const currentDomain = window.location.hostname;
            const savedVersion = localStorage.getItem('version');
            
            const isOnMainDomain = currentDomain === 'radiodjboga.online' || currentDomain === 'www.radiodjboga.online';
            const isOnMobileDomain = currentDomain === 'mobile.radiodjboga.online';
            
            // Если на мобильном домене
            if (isOnMobileDomain) {
                if (savedVersion === 'full') {
                    window.location.href = MAIN_DOMAIN;
                }
                return;
            }
            
            // Если на основном домене
            if (isOnMainDomain) {
                if (savedVersion === 'mobile' || (isMobileDevice() && savedVersion !== 'full')) {
                    window.location.href = MOBILE_DOMAIN;
                }
                return;
            }
        }

        // Запуск
        checkAndRedirect();
        
        window.addEventListener('resize', function() {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(checkAndRedirect, 250);
        });
        
        window.addEventListener('orientationchange', function() {
            setTimeout(checkAndRedirect, 200);
        });

        console.log('✅ Система активирована');
        console.log('📌 Текущий домен:', window.location.hostname);
        console.log('📱 Мобильное устройство:', isMobileDevice() ? 'Да' : 'Нет');
        console.log('💾 Сохраненная версия:', localStorage.getItem('version') || 'не выбрана');
    </script>
</body>
</html>
