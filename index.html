<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер и прямоугольник</title>
    <style>
        body, html {
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .player-container {
            width: 100%;
        }
        
        .rectangle-container {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }
        
        .white-rectangle {
            width: 100px;
            height: 50px;
            background-color: white;
            border: 2px solid black;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            top: -50px;
        }
    </style>
</head>
<body>
    <!-- Плеер сверху - ВАШ КОД -->
    <div class="player-container">
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" data-theme="light" data-color="FFFFFF" data-channelId="" data-rendered="false">
            <a href="https://www.caster.fm">Shoutcast Hosting</a> <a href="https://www.caster.fm">Stream Hosting</a> <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>
        <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
    </div>
    
    <!-- Белый прямоугольник -->
    <div class="rectangle-container">
        <div class="white-rectangle"></div>
    </div>
</body>
</html>
