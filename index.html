<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Важный тег для правильного отображения на мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Мобильная версия</title>
    <style>
        /* Базовый сброс стилей для мобильных */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Основной контейнер на всю ширину экрана */
        .mobile-container {
            width: 100%;
            max-width: 480px; /* Ограничение для больших телефонов */
            margin: 0 auto;
            padding: 16px;
            flex: 1;
        }

        /* Современные сенсорные элементы (пустые, но готовые к наполнению) */
        .touch-area {
            min-height: 48px; /* Минимальный размер для комфортного нажатия */
            width: 100%;
        }

        /* Заголовок для примера (пустой, но можно заполнить) */
        .mobile-header {
            width: 100%;
            height: 56px;
            background-color: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        /* Контентная область */
        .content {
            width: 100%;
            min-height: calc(100vh - 200px);
            background-color: transparent;
        }

        /* Нижняя навигация (пустая) */
        .bottom-nav {
            width: 100%;
            height: 64px;
            background-color: #f8f9fa;
            border-radius: 20px 20px 0 0;
            margin-top: auto;
        }

        /* Утилиты для отступов */
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
        .p-2 { padding: 8px; }
    </style>
</head>
<body>
    <img src="img/20260225_2221_image.png" alt="RADIO DJ BOGA" style="position: absolute; left: 0px; top: 0; width: 100%; height: auto;">
    <div class="mobile-container">
        <!-- Пустой верхний блок (можно заменить на header) -->
        <header class="mobile-header"></header>

        <!-- Основная пустая область контента -->
        <main class="content">
            <!-- Здесь будет контент -->
            <div class="touch-area">
                    
            </div>
            



    <!-- Место для подключения скриптов -->
    <script>
        // Здесь может быть ваш JavaScript
        console.log('Готовая мобильная оболочка');
    </script>
</body>
</html>
