<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер с обложкой</title>
    <style>
        body, html {
            padding: 0;
            margin: 0;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        /* Контейнер плеера */
        .player-container {
            position: absolute;
            top: 200px;
            left: 100px;
            width: 800px;        /* Ширина */
            height: 800px;        /* Высота = ширине - квадрат */
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
            background: #1a1a1a;  /* Темный фон для плеера */
        }
        
        /* Плеер на всю ширину */
        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Изображение на фоне */
        .bg-image {
            position: absolute;
            left: 680px;
            top: 248px;
            width: 1000px;
            height: auto;
            z-index: 1;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        /* Альтернатива - обложка внутри плеера */
        .player-with-cover {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .player-with-cover iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
    </style>
</head>
<body>
    <!-- Ваше изображение отдельно от плеера -->
    <img src="img/result_Без имени-1 копия.jpg" alt="RADIO DJ BOGA" class="bg-image">
    
    <!-- Квадратный плеер -->
    <div class="player-container">
        <iframe src="https://widgets.cloud.caster.fm/player/?publicToken=7cb75f5e-9e0a-4716-b67f-7e4940ba6987&theme=light&color=e81e4d&desktop=true" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
        </iframe>
    </div>
</body>
</html>
