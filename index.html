<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Белый прямоугольник</title>
    <style>
        /* Обнуляем отступы у body для более чистого вида, 
           чтобы прямоугольник ни к чему не прилипал, 
           если он будет единственным элементом */
        body {
            margin: 0;
            padding: 0;
            /* Добавим темный фон, чтобы белый прямоугольник было четко видно */
            background-color: #2c3e50; /* Темно-синий/серый фон для контраста */
            min-height: 100vh; /* Растягиваем body на всю высоту окна */
            /* Включаем флексбокс для легкого центрирования прямоугольника */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стили для самого белого прямоугольника */
        .white-rectangle {
            width: 400px;        /* Ширина прямоугольника */
            height: 250px;       /* Высота прямоугольника */
            background-color: white; /* Белый цвет заливки */
            border: 2px solid black; /* Добавим тонкую черную рамку, чтобы 
                                        края белого не сливались с белым фоном, 
                                        если фон вдруг изменится. 
                                        При желании можно убрать. */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); /* Легкая тень для объема */
        }
    </style>

</body>
</html>
