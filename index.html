<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.0">
    <title>Плеер</title>
</head>
<body>
    <div class="version-switcher">
        <!-- Кнопка полной версии (иконка монитора) -->
        <a href="?view=full" class="btn-version" title="Полная версия">
            <span class="icon-desktop">💻</span>
        </a>
        <!-- Кнопка мобильной версии (иконка телефона) -->
        <a href="?view=mobile" class="btn-version" title="Мобильная версия">
            <span class="icon-mobile"> 📱</span>
        </a>
    </div>
</body>

    <style>
        /* Пример: Кнопки на мобильном становятся на всю ширину */
@media (max-width: 600px) {
    .button {
        width: 100%;
        font-size: 18px;
        padding: 15px;
        z-index: 1000;
    }
    .container {
        flex-direction: column; /* Элементы идут друг за другом */
    }
}
    .version-switcher {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 10px;
}

    .btn-version {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 45px; /* Квадратный размер */
        height: 45px;
        background-color: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 8px; /* Скругление углов */
        text-decoration: none;
        font-size: 24px; /* Размер эмодзи/иконки */
        color: #333;
        transition: background-color 0.3s;
        z-index: 1000;
    }

    .btn-version:hover {
        background-color: #ddd;
    }
        /* Контейнер для плеера с возможностью перемещения */
        .player-container {
            position: absolute;
            top: 1000px;  /* Измените это значение */
            left: -12px; /* Измените это значение */
            width: 700px;/* Автоматическая ширина */  
            height: 500px;
            z-index: 1000; /* Чтобы плеер был поверх других элементов */
        }
    </style>
</head>
<body>
    <!-- Изображение (перенес из head в body) -->
    <img src="img/20260225_2221_image.png" alt="RADIO DJ BOGA" style="position: absolute; left: 1680px; top: 0;">
    <img src="img/result_Без имени-1 копия.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 0px; width: 1000px; height: auto;">
    <img src="img/i1.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 1000px; width: 1000px; height: 248px;">
    
    <!-- Плеер -->
    <div class="player-container">
        <div data-type="newStreamPlayer" data-publicToken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false" class="cstrEmbed">
            <a href="https://www.caster.fm">Shoutcast Hosting</a> 
            <a href="https://www.caster.fm">Stream Hosting</a> 
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>
        <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
    </div>
</body>
</html>
