<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер RADIO DJ BOGA</title>

    <style>
        /* Стили для контейнера плеера (как у вас) */
        .player-container {
            position: absolute;
            top: 1000px;
            left: -12px;
            width: 700px;
            height: 500px;
            z-index: 1000;
        }

        /* Стили для кнопок переключения */
        .version-switcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 10000;
            background: rgba(0,0,0,0.6);
            padding: 15px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .version-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #btnMobile {
            background: #e81e4d;
        }

        #btnFull {
            background: #4CAF50;
        }

        .version-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .version-btn:active {
            transform: scale(0.95);
        }

        /* Адаптация кнопок на маленьких экранах */
        @media (max-width: 600px) {
            .version-switcher {
                bottom: 20px;
                right: 20px;
                padding: 10px 15px;
                gap: 10px;
                flex-direction: column;
                border-radius: 30px;
            }
            .version-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ВАШИ ИЗОБРАЖЕНИЯ (без изменений) -->
    <img src="img/20260225_2221_image.png" alt="RADIO DJ BOGA" style="position: absolute; left: 1675px; top: 0;">
    <img src="img/result_Без имени-1 копия.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 0px; width: 1000px; height: auto;">
    <img src="img/i1.jpg" alt="RADIO DJ BOGA" style="position: absolute; left: 680px; top: 1000px; width: 1000px; height: 248px;">

    <!-- ВАШ ПЛЕЕР (без изменений) -->
    <div class="player-container">
        <div data-type="newStreamPlayer" data-publicToken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false" class="cstrEmbed">
            <a href="https://www.caster.fm">Shoutcast Hosting</a>
            <a href="https://www.caster.fm">Stream Hosting</a>
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>
        <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
    </div>

    <!-- Кнопки переключения версий -->
    <div class="version-switcher">
        <button id="btnMobile" class="version-btn" onclick="switchToMobile()">📱 Мобильная</button>
        <button id="btnFull" class="version-btn" onclick="switchToFull()">💻 Полная</button>
    </div>

    <script>
        // ========================================
        // НАСТРОЙКА ДОМЕНОВ - ИЗМЕНИ ЭТИ СТРОКИ!
        // ========================================
        const MAIN_DOMAIN = "https://radiodjboga.online";        // Основной домен (РАБОТАЕТ)
        const MOBILE_DOMAIN = "https://radiodjboga.online/mobile"; // ВРЕМЕННОЕ РЕШЕНИЕ - папка /mobile на основном домене
        
        // ========================================
        // Функции для ручного переключения
        // ========================================
        function switchToMobile() {
            localStorage.setItem('version', 'mobile');
            // ПРОСТАЯ ПРОВЕРКА: открываем в новом окне для теста
            window.open(MOBILE_DOMAIN, '_blank');
            // Если нужно в этом же окне, раскомментируй следующую строку:
            // window.location.href = MOBILE_DOMAIN;
        }

        function switchToFull() {
            localStorage.setItem('version', 'full');
            window.location.href = MAIN_DOMAIN;
        }

        // ========================================
        // Функция определения мобильного устройства
        // ========================================
        function isMobileDevice() {
            return window.innerWidth <= 768 || 
                   /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // ========================================
        // Автоматический редирект
        // ========================================
        function checkAndRedirect() {
            const savedVersion = localStorage.getItem('version');
            
            // Если пользователь явно выбрал полную версию - не редиректим
            if (savedVersion === 'full') {
                return;
            }
            
            // Если мобильное устройство И не выбрана полная версия
            if (isMobileDevice() && savedVersion !== 'full') {
                // Показываем предупреждение, что мобильный домен не настроен
                alert('Мобильная версия находится в разработке. Сайт откроется в новой вкладке для теста.');
                window.open(MOBILE_DOMAIN, '_blank');
            }
        }

        // ========================================
        // Запуск проверок
        // ========================================
        
        // Запускаем при загрузке страницы
        checkAndRedirect();
        
        // Следим за изменением размера окна
        window.addEventListener('resize', function() {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(checkAndRedirect, 250);
        });
        
        // Следим за изменением ориентации
        window.addEventListener('orientationchange', function() {
            setTimeout(checkAndRedirect, 200);
        });

        console.log('✅ Система переключения версий активирована');
        console.log('📌 Текущий домен:', window.location.hostname);
    </script>

    <!-- ======================================== -->
    <!-- ИНСТРУКЦИЯ ПО НАСТРОЙКЕ МОБИЛЬНОЙ ВЕРСИИ -->
    <!-- ======================================== -->

    3. В настройках домена (строка 96) раскомментируй:
       const MOBILE_DOMAIN = "https://radiodjboga.online/mobile";
    
    ВАРИАНТ 2 (ПРАВИЛЬНЫЙ):
    1. Зайди в панель управления хостингом
    2. Создай поддомен mobile.radiodjboga.online
    3. Настрой HTTPS для этого поддомена
    4. Скопируй туда файлы сайта
    5. В строке 96 замени на:
       const MOBILE_DOMAIN = "https://mobile.radiodjboga.online";
    
    СЕЙЧАС РАБОТАЕТ ТАК:
    • Кнопка "Мобильная" открывает сайт в новой вкладке для теста
    • Автоматически ничего не перенаправляет без подтверждения
    -->
</body>
</html>
