    <style>
        /* Стили для контейнера плеера */
        .player-container {
            position: absolute;
            top: 1000px;
            left: -12px;
            width: 700px;
            height: 500px;
            z-index: 1000;
        }
    </style>
    
    <!-- ИСПРАВЛЕНО: JavaScript теперь внутри тега <script> -->
    <script>
        // Функция для перехода на мобильную версию
        function switchToMobile() {
            localStorage.setItem('version', 'mobile');
            // ЗАМЕНИТЕ НА ВАШ АДРЕС: 
            window.location.href = "https://m.yoursite.com"; 
        }
        
        // Функция для перехода на полную версию
        function switchToFull() {
            localStorage.setItem('version', 'full');
            // ЗАМЕНИТЕ НА ВАШ АДРЕС:
            window.location.href = "https://yoursite.com";
        }
        
        // ИСПРАВЛЕНО: Условие для автоматического редиректа теперь выполняется
        if (window.innerWidth <= 768 && localStorage.getItem('version') !== 'full') {
            // ЗАМЕНИТЕ НА ВАШ МОБИЛЬНЫЙ АДРЕС:
            window.location.href = "https://m.yoursite.com";
        }
    </script>
