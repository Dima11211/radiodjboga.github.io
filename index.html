<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Важный тег для правильного отображения на мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Мобильная версия</title>
    <style>
        /* Базовый сброс стилей для мобильных */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Основной контейнер на всю ширину экрана */
        .mobile-container {
            width: 100%;
            max-width: 480px; /* Ограничение для больших телефонов */
            margin: 0 auto;
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Шапка с логотипом */
        .mobile-header {
            width: 100%;
            padding: 16px 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Стили для текстового логотипа */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-item {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .logo-item.radio {
            color: #000000;
        }

        .logo-item.dji {
            color: #000000;
            font-weight: 700;
        }

        .logo-item.boga {
            color: #000000;
            font-style: italic;
        }

        /* Разделитель между логотипами */
        .logo-divider {
            width: 4px;
            height: 4px;
            background-color: #000000;
            border-radius: 50%;
            margin: 0 4px;
        }

        .logo-dots {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Контейнер для изображения - центрирование */
        .image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        /* Стили для изображения - фиксированная ширина с адаптацией */
        .center-image {
            width: 384px; /* Фиксированная ширина на десктопе */
            max-width: 100%; /* Но на мобильных не будет шире экрана */
            height: auto;
            display: block;
            object-fit: contain; /* Сохраняет пропорции */
        }

        /* Контентная область */
        .content {
            width: 100%;
            flex: 1;
            background-color: transparent;
        }

        /* Нижняя навигация (пустая) */
        .bottom-nav {
            width: 100%;
            height: 64px;
            background-color: #f8f9fa;
            border-radius: 20px 20px 0 0;
            margin-top: auto;
        }

        /* Утилиты для отступов */
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
        .p-2 { padding: 8px; }

        /* Медиа-запрос для очень маленьких экранов */
        @media (max-width: 400px) {
            .center-image {
                width: 100%; /* На совсем маленьких экранах занимает всю ширину */
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- Шапка с логотипом RADIO DJI BOGA -->
        <header class="mobile-header">
            <div class="logo">
                <span class="logo-item radio">RADIO</span>
                <span class="logo-dots">
                    <span class="logo-divider"></span>
                    <span class="logo-divider"></span>
                    <span class="logo-divider"></span>
                </span>
                <span class="logo-item dji">DJI</span>
                <span class="logo-dots">
                    <span class="logo-divider"></span>
                    <span class="logo-divider"></span>
                    <span class="logo-divider"></span>
                </span>
                <span class="logo-item boga">BOGA</span>
            </div>
            <!-- Кнопка-меню справа -->
            <div style="width: 40px; height: 40px; background-color: #f5f5f5; border-radius: 50%;"></div>
        </header>

        <!-- Контейнер с изображением по центру -->
        <div class="image-container">
            <img src="img/20260225_2221_image.png" 
                 alt="RADIO DJ BOGA" 
                 class="center-image">
        </div>

        <!-- Основная пустая область контента -->
        <main class="content">
            <!-- Пустые карточки для примера (можно удалить) -->
            <div style="width: 100%; height: 80px; background-color: #f1f3f5; border-radius: 12px; margin-bottom: 12px;"></div>
            <div style="width: 100%; height: 120px; background-color: #f1f3f5; border-radius: 12px; margin-bottom: 12px;"></div>
            <div style="width: 100%; height: 60px; background-color: #f1f3f5; border-radius: 12px;"></div>
        </main>

        <!-- Пустая нижняя навигация -->
        <nav class="bottom-nav"></nav>
    </div>

    <script>
        console.log('Мобильная версия с изображением по центру');
    </script>
</body>
</html>
