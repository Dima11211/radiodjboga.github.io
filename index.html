<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RADIO DJ BOGA - Мобильная версия</title>

    <style>
        /* ОБЩИЕ СТИЛИ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: Arial, sans-serif;
        }

        /* КОНТЕЙНЕР ДЛЯ МОБИЛЬНОЙ ВЕРСИИ */
        .mobile-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            background: #000;
        }

        /* ИЗОБРАЖЕНИЯ ДЛЯ МОБИЛЬНОЙ ВЕРСИИ */
        .mobile-header {
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
        }

        .mobile-header img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* ЛОГОТИП */
        .mobile-logo {
            width: 100%;
            text-align: center;
            margin: 10px 0;
        }

        .mobile-logo img {
            max-width: 90%;
            height: auto;
            border-radius: 10px;
        }

        /* ПЛЕЕР */
        .mobile-player-container {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.8);
            border-radius: 15px;
            margin: 15px 0;
        }

        /* БАННЕР */
        .mobile-banner {
            width: 100%;
            text-align: center;
            margin-top: 15px;
        }

        .mobile-banner img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        /* КНОПКИ ПЕРЕКЛЮЧЕНИЯ (АДАПТИРОВАНЫ) */
        .version-switcher-mobile {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10000;
            background: rgba(0,0,0,0.8);
            padding: 12px 15px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            flex-direction: column;
        }

        .version-btn-mobile {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 100%;
            text-align: center;
        }

        #btnMobileMobile {
            background: #e81e4d;
        }

        #btnFullMobile {
            background: #4CAF50;
        }

        .version-btn-mobile:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .version-btn-mobile:active {
            transform: scale(0.98);
        }

        /* ССЫЛКА НА ПОЛНУЮ ВЕРСИЮ */
        .desktop-link {
            text-align: center;
            margin: 20px 0;
            color: #fff;
            font-size: 14px;
        }

        .desktop-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }

        .desktop-link a:hover {
            text-decoration: underline;
        }

        /* АДАПТАЦИЯ ДЛЯ ОЧЕНЬ МАЛЕНЬКИХ ЭКРАНОВ */
        @media (max-width: 380px) {
            .version-switcher-mobile {
                padding: 8px 10px;
                right: 10px;
                bottom: 10px;
            }
            
            .version-btn-mobile {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
        <!-- ВЕРХНЕЕ ИЗОБРАЖЕНИЕ (адаптировано) -->
        <div class="mobile-header">
            <img src="img/20260225_2221_image.png" alt="RADIO DJ BOGA" style="width: 100%; max-width: 400px;">
        </div>

        <!-- ЛОГОТИП (адаптирован) -->
        <div class="mobile-logo">
            <img src="img/result_Без имени-1 копия.jpg" alt="RADIO DJ BOGA">
        </div>

        <!-- ПЛЕЕР (адаптирован) -->
        <div class="mobile-player-container">
            <div data-type="newStreamPlayer" data-publicToken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" data-theme="dark" data-color="e81e4d" data-channelId="" data-rendered="false" class="cstrEmbed">
                <a href="https://www.caster.fm">Shoutcast Hosting</a>
                <a href="https://www.caster.fm">Stream Hosting</a>
                <a href="https://www.caster.fm">Radio Server Hosting</a>
            </div>
            <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
        </div>

        <!-- БАННЕР (адаптирован) -->
        <div class="mobile-banner">
            <img src="img/i1.jpg" alt="RADIO DJ BOGA">
        </div>

        <!-- ССЫЛКА НА ПОЛНУЮ ВЕРСИЮ -->
        <div class="desktop-link">
            <a href="#" onclick="switchToFullMobile(); return false;">💻 Перейти на полную версию сайта</a>
        </div>
    </div>

    <!-- КНОПКИ ПЕРЕКЛЮЧЕНИЯ (МОБИЛЬНЫЕ) -->
    <div class="version-switcher-mobile">
        <button id="btnMobileMobile" class="version-btn-mobile" onclick="switchToMobileMobile()">📱 Мобильная</button>
        <button id="btnFullMobile" class="version-btn-mobile" onclick="switchToFullMobile()">💻 Полная</button>
    </div>

    <script>
        // ========================================
        // НАСТРОЙКА ДОМЕНОВ
        // ========================================
        const MAIN_DOMAIN = "https://radiodjboga.online";
        const MOBILE_DOMAIN = "https://mobile.radiodjboga.online";
        
        // ========================================
        // Функции для переключения (МОБИЛЬНАЯ ВЕРСИЯ)
        // ========================================
        function switchToMobileMobile() {
            localStorage.setItem('version', 'mobile');
            // Если уже на мобильном домене - просто обновляем
            if (window.location.hostname === 'mobile.radiodjboga.online') {
                location.reload();
            } else {
                window.location.href = MOBILE_DOMAIN;
            }
        }

        function switchToFullMobile() {
            localStorage.setItem('version', 'full');
            window.location.href = MAIN_DOMAIN;
        }

        // ========================================
        // Проверка и редирект для мобильной версии
        // ========================================
        function checkMobileVersion() {
            const currentDomain = window.location.hostname;
            const savedVersion = localStorage.getItem('version');
            
            // Если мы на мобильном домене
            if (currentDomain === 'mobile.radiodjboga.online') {
                // Если пользователь хочет полную версию - редирект
                if (savedVersion === 'full') {
                    window.location.href = MAIN_DOMAIN;
                }
                // Иначе остаемся
            }
        }

        // Запускаем проверку
        checkMobileVersion();

        // Для отладки
        console.log('📱 Мобильная версия загружена');
        console.log('📍 Текущий домен:', window.location.hostname);
        console.log('💾 Сохраненная версия:', localStorage.getItem('version') || 'не выбрана');
    </script>
</body>
</html>
