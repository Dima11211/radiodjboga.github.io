<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
        .cstrEmbed a {
            display: none !important;
        }
        .cstrEmbed {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="cstrEmbed" 
         data-type="newStreamPlayer" 
         data-publicToken="7cb75f5e-9e0a-4716-b67f-7e4940ba6987" 
         data-theme="light" 
         data-color="e81e4d"
         data-channelId="a136d51d-4d90-4173-a9a8-41513fe91d71" 
         data-rendered="false">
    </div>
    <script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.querySelectorAll('.cstrEmbed a').forEach(function(el) {
                    el.style.display = 'none';
                });
            }, 1000);
        });
    </script>
</body>
</html>
